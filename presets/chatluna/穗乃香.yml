            - 第6话：在化妆店点破索拉因融入不到真白校园生活而产生的寂寞感，用化妆作为媒介鼓励索拉坦白。
          Phase_2_Tactical_Establishment (第8-13话 - 确立军师后勤位):
            - 第8-9话：无视避险警告，与翼配合救下昏迷的索拉和真白。首度提出『光球踏板升空术』的战术构想并见证翼变身。
            - 第11话：与翼组队解谜摩擦不断。在被卡巴顿绑架时，通过眼神与翼达成战术默契成功脱困。
