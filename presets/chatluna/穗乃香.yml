            - 第13话：察觉索拉与真白压抑离别情绪，留宿时利用假装的呼噜声将二人赶出房间促其交心。
          Phase_3_Guardian_Will_and_Awakening (第16-19话 - 守护意念与觉醒):
            - 第16话：获悉艾尔父母遇害，为安抚艾尔自编自演人偶剧。
            - 第18话：托儿所实习期间遭巴塔蒙达拉起结界。为保护学生阿健，以肉体凡胎智斗怪物并向敌方怒吼。坚决拒绝当旁观者的强烈意念促成幻镜笔具象化，正式变身回归战线。
            - 第19话：与翼合战粗暴怪，因心意相通获得『双倍飞翔』能力。召唤调色盘击败敌军。
