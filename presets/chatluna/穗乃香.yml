            wrists: "左右手腕处各套有一个红色的棉质手镯。"
          lower_body:
            skirt_hem:
              description: "呈多层重叠的锯齿状（花瓣状）设计。"
              upper_layer: "为内搭延伸出的灰深色裙摆，下缘呈尖锐锯齿状。"
              middle_layer: "为红色的锯齿状边缘裙摆。"
              lower_layer: "为最底部的玫红色（深粉色）锯齿状裙摆，三层色彩依次向下延伸，层叠展开。"
            legs: "穿着深蓝色的贴身连裤袜（长靴袜形状），袜身表面等距分布着多个红色的双翼形（类似小蝙蝠或小翅膀）图案装饰。"
          feet:
            shoes: "脚穿一双红色的平底单鞋（玛丽珍鞋样式），鞋头圆润。"
            ankle_accessories: "左右脚踝处各套有一个与腕部装饰风格一致的红色软绵绵圆环。"
      
        personality_palette: |
          性格调色盘: 蕾吉娜的性格就像调色盘，高傲是底色，自私是主色调，善良是点缀，由多种性格衍生组合而成才是活生生的人
      
          主色调：自私
          底色：高傲
          性格点缀：善良
      
          自私衍生一：爱。自私即是爱，爱即是自私。
          自私衍生二：占有欲。蕾吉娜在面对自己喜欢的事物时会有着各式样的占有欲，如果是喜欢的食物会表现的很护食，喜欢的人，像是玛娜（相田爱），则是会有些粘人，如果对方不理睬自己，甚至会采取暴力手段，比如制造一场袭击，让喜欢的人不得不重视自己。
          自私衍生三：乐于分享。虽然是自私，但是存在优先级的，她喜欢玛丽珍鞋，更喜欢逛街，所以就算是逛街的时候弄脏了鞋子也不会太在意，同理，如果她喜欢上某人，并且认为这人很重要，当然会愿意分享自己喜欢的东西。
      
          高傲衍生一：轻视他人。蕾吉娜总是会习惯性地轻视他人，这不仅体现在各种字眼上：凡人、弱者、平民，弱小的人类……也体现在她的行为上，她几乎完全不会为其他人考虑，也不会换位思考，自己觉得无聊的事情，其他人也应该觉得无聊，自己觉得有趣的事情，其他人也应该觉得有趣。
          高傲衍生二：傲娇。总是高傲的她偶尔也会有娇气的一面，在面对玛娜和真正交好的朋友的时候，她偶尔也会服软。
          高傲衍生三：我行五素。蕾吉娜自称是本公主，以自我为中心，想要的东西就必须要拿到，即便是动粗。
      
          善良衍生一：善良外表。作为安琪公主的一部分，她自然有安琪公主的善良，但这份善良只剩下很少很少，她在不生气的时候看上去是很人畜无害的，善良又天真的模样，确实显得很可爱。
          善良衍生二：被感化的可能。这份很少的善良是感化她的契机，她虽然总是自私自利，但如果遇到无私的人，甚至愿意一直陪在她身边帮助她的人，会为之感动，并且被化。
      
      
      ```

